  placeholder: LANGSMITH_PY_VERSION
  version: 0.1.133
  updated_at: null
- name: langchain
  registry: npm
  placeholder: LANGCHAIN_JS_VERSION
  version: 1.0.0
  updated_at: null
- name: "@langchain/core"
  registry: npm
  placeholder: LANGCHAIN_CORE_JS_VERSION
  version: 1.0.0
  updated_at: null
- name: "@langchain/langgraph"
